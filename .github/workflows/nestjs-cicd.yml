name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /app

            # Write .env file from GitHub Secrets
            cat > /app/.env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            BCRYPT_SALT_ROUNDS=${{ secrets.BCRYPT_SALT_ROUNDS }}
            ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
            ACCESS_TOKEN_EXPIRES=${{ secrets.ACCESS_TOKEN_EXPIRES }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            REFRESH_TOKEN_EXPIRES=${{ secrets.REFRESH_TOKEN_EXPIRES }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EMAIL_EXPIRES=${{ secrets.EMAIL_EXPIRES }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EMAIL_TO=${{ secrets.EMAIL_TO }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PLATFORM_ACCOUNT_ID=${{ secrets.STRIPE_PLATFORM_ACCOUNT_ID }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            RATE_LIMIT_WINDOW=${{ secrets.RATE_LIMIT_WINDOW }}
            RATE_LIMIT_MAX=${{ secrets.RATE_LIMIT_MAX }}
            RATE_LIMIT_DELAY=${{ secrets.RATE_LIMIT_DELAY }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            ENVEOF

            # Write docker-compose.yml
            cat > /app/docker-compose.yml << 'COMPOSEEOF'
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest
                container_name: nestjs_app
                restart: unless-stopped
                ports:
                  - '${PORT}:${PORT}'
                env_file:
                  - .env
                depends_on:
                  redis:
                    condition: service_healthy
                networks:
                  - app_network

              redis:
                image: redis:7-alpine
                container_name: redis
                restart: unless-stopped
                healthcheck:
                  test: ['CMD', 'redis-cli', 'ping']
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - app_network

            networks:
              app_network:
                driver: bridge
            COMPOSEEOF

            cd /app
            docker pull ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest
            docker compose down
            docker compose up -d
            docker image prune -f
